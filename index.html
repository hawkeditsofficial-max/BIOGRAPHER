<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGraphYer | AI Life Chronicler</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #bf953f; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #bf953f; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="selection:bg-yellow-500 selection:text-black">

    <nav class="p-6 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-bold tracking-tighter uppercase italic cursor-pointer" onclick="location.reload()">
            Bio<span class="gold-gradient">GraphYer</span>
        </h1>
        <div class="text-[10px] uppercase tracking-[0.3em] opacity-40 hidden md:block">Neural History Engine v3.0</div>
    </nav>

    <header class="max-w-4xl mx-auto pt-24 pb-12 px-6 text-center">
        <h2 class="serif text-5xl md:text-8xl mb-6 leading-tight">Every life is a <br><span class="italic text-white">Masterpiece.</span></h2>
        <p class="text-gray-500 mb-12 text-lg max-w-xl mx-auto">Generate a structured, printable biography using real-time AI intelligence.</p>
        
        <div class="relative max-w-2xl mx-auto">
            <input type="text" id="personInput" placeholder="Enter a name (e.g. Leonardo Da Vinci)..." 
                   class="w-full bg-white/5 border border-white/20 rounded-full py-6 px-10 outline-none focus:border-yellow-600 transition-all text-xl pr-40">
            <button onclick="generateBio()" id="mainBtn" class="absolute right-3 top-3 bg-white text-black hover:bg-yellow-500 font-bold py-3 px-8 rounded-full transition-all">
                CHRONICLE
            </button>
        </div>
        <p id="statusMsg" class="mt-6 text-sm text-gray-500 italic h-5"></p>
    </header>

    <main id="resultArea" class="max-w-6xl mx-auto px-6 py-20 hidden">
        
        <div id="captureArea" class="bg-[#050505] p-10 rounded-3xl border border-white/5">
            <div class="flex flex-col md:flex-row gap-16">
                <div class="md:w-1/3">
                    <div class="aspect-[3/4] bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center mb-8">
                        <span class="text-white/10 serif text-8xl italic">B</span>
                    </div>
                    <h3 class="gold-gradient uppercase text-[10px] tracking-[0.4em] mb-4 font-bold">01. Introduction</h3>
                    <div id="bio-intro" class="serif text-3xl leading-snug text-white italic"></div>
                </div>

                <div class="md:w-2/3 space-y-16">
                    <div class="grid md:grid-cols-2 gap-12">
                        <section>
                            <h3 class="gold-gradient uppercase text-[10px] tracking-[0.4em] mb-4 font-bold">02. Roots & Birth</h3>
                            <p id="bio-roots" class="text-gray-400 leading-relaxed"></p>
                        </section>
                        <section>
                            <h3 class="gold-gradient uppercase text-[10px] tracking-[0.4em] mb-4 font-bold">03. Early Struggles</h3>
                            <p id="bio-struggles" class="text-gray-400 leading-relaxed"></p>
                        </section>
                    </div>
                    
                    <section class="glass p-8 rounded-2xl">
                        <h3 class="gold-gradient uppercase text-[10px] tracking-[0.4em] mb-4 font-bold">04. Family & Circle</h3>
                        <p id="bio-family" class="text-gray-300"></p>
                    </section>

                    <section>
                        <h3 class="gold-gradient uppercase text-[10px] tracking-[0.4em] mb-4 font-bold">05. Legacy & Conclusion</h3>
                        <p id="bio-legacy" class="text-xl text-white serif leading-relaxed border-l border-yellow-800 pl-8 italic"></p>
                    </section>
                </div>
            </div>
        </div>

        <div class="mt-16 flex flex-col md:flex-row items-center justify-center gap-8 border-t border-white/10 pt-16">
            <button onclick="downloadPDF()" id="pdfBtn" class="flex items-center gap-3 bg-white/5 hover:bg-white/10 text-white px-8 py-4 rounded-full border border-white/20 transition-all">
                Download PDF Chronicle
            </button>
            
            <a href="https://www.buymeacoffee.com/YOUR_USERNAME" target="_blank" class="flex items-center gap-3 bg-[#FFDD00] text-black font-bold px-8 py-4 rounded-full hover:scale-105 transition-transform">
                <img src="https://cdn.buymeacoffee.com/buttons/bmc-new-btn-logo.svg" alt="BMC" class="w-5">
                Support the AI
            </a>
        </div>
    </main>

    <footer class="py-20 text-center opacity-20 text-[10px] uppercase tracking-[0.5em]">
        Built for the Archive &bull; 2026
    </footer>

    <script>
        // CONFIGURATION
        const API_KEY = "AIzaSyCImyO22DmqtpJV4BZM9rD1LXkMiPe3eI0"; 

        async function generateBio() {
            const name = document.getElementById('personInput').value.trim();
            const status = document.getElementById('statusMsg');
            const btn = document.getElementById('mainBtn');
            
            if(!name) return;

            // 1. Check Cache (Option A)
            const cached = localStorage.getItem(`bio_${name.toLowerCase()}`);
            if(cached) {
                status.innerText = "Retrieved from local archive...";
                render(JSON.parse(cached));
                return;
            }

            status.innerText = "Synthesizing life data...";
            btn.disabled = true;
            btn.innerText = "WORKING...";

            try {
                // 2. AI Request
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Generate a biography for ${name}. Return ONLY a JSON object with keys: intro, roots, struggles, family, legacy.` }] }],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                // 3. Handle Limits (Option C)
                if(response.status === 429) {
                    status.innerHTML = "<span class='text-red-500'>The Archive is full for today. Return in 24 hours.</span>";
                    btn.innerText = "LIMIT REACHED";
                    return;
                }

                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);

                // 4. Save to Cache & Render
                localStorage.setItem(`bio_${name.toLowerCase()}`, JSON.stringify(content));
                render(content);
                
                status.innerText = "Generation complete.";
                btn.disabled = false;
                btn.innerText = "CHRONICLE";

            } catch (e) {
                console.error(e);
                status.innerText = "Error connecting to the neural network.";
                btn.disabled = false;
                btn.innerText = "RETRY";
            }
        }

        function render(data) {
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('bio-intro').innerText = data.intro;
            document.getElementById('bio-roots').innerText = data.roots;
            document.getElementById('bio-struggles').innerText = data.struggles;
            document.getElementById('bio-family').innerText = data.family;
            document.getElementById('bio-legacy').innerText = data.legacy;
            
            window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 50, behavior: 'smooth' });
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const btn = document.getElementById('pdfBtn');
            btn.innerText = "Chiseling PDF...";

            const canvas = await html2canvas(document.getElementById('captureArea'), {
                backgroundColor: "#050505",
                scale: 2
            });

            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const width = pdf.internal.pageSize.getWidth();
            const height = (canvas.height * width) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, width, height);
            pdf.save(`BioGraphYer_Chronicle.pdf`);
            btn.innerText = "Download PDF Chronicle";
        }
    </script>
</body>
</html>
